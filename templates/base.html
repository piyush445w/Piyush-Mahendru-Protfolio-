<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Piyush Mahendru — Machine Learning Engineer portfolio">
  <meta name="theme-color" content="#0F0F10">

  <!-- Google Fonts preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <!-- Animations / interactivity styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js" defer></script>

  <!-- Lenis Smooth Scroll -->
  <script src="https://unpkg.com/lenis@1.1.19/dist/lenis.min.js" defer></script>

  <title>{% block title %}Piyush Mahendru | ML Engineer{% endblock %}</title>
  {% block extra_head %}{% endblock %}
</head>
<body id="top">
  <!-- Scroll Progress Bar -->
  <div id="scroll-progress" class="scroll-progress-bar" aria-hidden="true"></div>

  <!-- Custom Cursor -->
  <div class="custom-cursor" id="customCursor" aria-hidden="true">
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>
  </div>

  <!-- Spotlight Effect -->
  <div class="spotlight-overlay" id="spotlightOverlay" aria-hidden="true"></div>

  <!-- Floating Particles Canvas -->
  <canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>

  <!-- Navbar -->
  <nav class="navbar" aria-label="Primary">
    <a href="#top" class="navbar-logo">{{ PROFILE.name }}</a>

    <button class="navbar-toggle" aria-label="Toggle navigation menu" id="navToggle">
      <span></span><span></span><span></span>
    </button>

    <ul class="navbar-links" id="navLinks">
      <li><a href="#hero" class="active">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#impact">Impact</a></li>
      <li><a href="#education">Education</a></li>
      <li><a href="#certifications">Certifications</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>

    <a href="{{ PROFILE.resume_pdf }}" class="navbar-resume" download>Résumé</a>
  </nav>

  <main id="content">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer id="footer">
    <p>&copy; {{ PROFILE.name }} — Built with Flask + GSAP + Lenis</p>
    <ul class="footer-links">
      <li><a href="{{ PROFILE.linkedin }}" target="_blank" rel="noopener">LinkedIn</a></li>
      <li><a href="{{ PROFILE.github }}" target="_blank" rel="noopener">GitHub</a></li>
      <li><a href="mailto:{{ PROFILE.email }}">Email</a></li>
    </ul>
  </footer>

  <!-- Main JavaScript -->
  <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
  <!-- Contact Form AJAX -->
  <script defer src="{{ url_for('static', filename='js/form.js') }}"></script>
</body>
</html>

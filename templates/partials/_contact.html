<section id="contact" aria-label="Contact">
  <div class="container">
    <h2 class="section-title" data-reveal>Contact</h2>
    <div class="contact-links" data-reveal data-reveal-delay="0.15">
      <a href="mailto:{{ PROFILE.email }}">{{ PROFILE.email }}</a>
      <a href="{{ PROFILE.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
      <a href="{{ PROFILE.github }}" target="_blank" rel="noopener">GitHub</a>
      <span>{{ PROFILE.location }}</span>
    </div>

    <!-- Inline feedback banner -->
    <div id="form-feedback" class="form-feedback" role="alert" style="display:none"></div>

    <form method="POST" action="/contact" id="contact-form" class="contact-form" data-reveal data-reveal-delay="0.30">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <!-- Honeypot field -->
      <div style="position:absolute;left:-9999px" aria-hidden="true">
        <label for="website">Website</label>
        <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required minlength="10"></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
  </div>
</section>

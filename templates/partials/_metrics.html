<section class="metrics" id="impact" aria-label="Impact">
    <div class="container">
        <h2 class="section-title">Impact</h2>
        <div class="metrics-grid">
            {% for metric in impact %}
            <div class="metric-item">
                <span class="metric-value" data-target="{{ metric.value }}">{{ metric.value }}{{ metric.suffix }}</span>
                <span class="metric-label">{{ metric.label }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
